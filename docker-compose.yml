version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  api:
    build: .
    command: uvicorn backend.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./data:/app/data
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  worker:
    build: .
    command: celery -A backend.crawlers.worker worker -c 4 --loglevel=info
    volumes:
      - .:/app
      - ./data:/app/data
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  beat:
    build: .
    command: celery -A backend.crawlers.worker beat --loglevel=info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

  flower:
    build: .
    command: celery -A backend.crawlers.worker flower --port=5555
    ports:
      - "5555:5555"
    env_file: .env
    depends_on:
      - redis
    restart: unless-stopped

volumes:
  redis_data:
